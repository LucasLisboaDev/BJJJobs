name: Tests

on:
  push:
    branches: [main, appleDesign]
  pull_request:
    branches: [main, appleDesign]

jobs:
  api-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: jiujitsujobs_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d jiujitsujobs_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      CI: "true"
      DATABASE_URL: postgresql://test:test@localhost:5432/jiujitsujobs_test
      TEST_DATABASE_URL: postgresql://test:test@localhost:5432/jiujitsujobs_test
      NODE_ENV: test
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
      CLERK_SECRET_KEY: sk_test_ci_placeholder
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run test:api

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: api-tests

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: jiujitsujobs_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d jiujitsujobs_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      CI: "true"
      DATABASE_URL: postgresql://test:test@localhost:5432/jiujitsujobs_test
      TEST_DATABASE_URL: postgresql://test:test@localhost:5432/jiujitsujobs_test
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
      CLERK_SECRET_KEY: sk_test_ci_placeholder
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /login
      NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /dashboard
      NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /dashboard
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npx playwright install chromium --with-deps

      - run: npm run test:e2e:public

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
